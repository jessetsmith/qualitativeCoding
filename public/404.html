<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Redirecting…</title>
  <script>
    (function (l) {
      // Preserve the original path/query/hash in ?p= so the SPA can restore it.
      var p = l.pathname + l.search + l.hash;
      var target = l.origin + '/?p=' + encodeURIComponent(p);
      l.replace(target);
    })(window.location);
  </script>
</head>
<body>
  <noscript>
    This site uses JavaScript for routing. Please go back to the home page.
  </noscript>
</body>
</html>
